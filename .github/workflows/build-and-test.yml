name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Type check backend
        run: cd backend && npx tsc --noEmit

      - name: Type check frontend
        run: cd frontend && npx tsc -p tsconfig.app.json --noEmit

      - name: Lint frontend
        run: npm run lint -w frontend

      - name: Run backend tests
        run: npm run test -w backend

      - name: Run frontend tests
        run: npm run test -w frontend

      - name: Build
        run: npm run build

      - name: Seed database for E2E
        run: cd backend && npx prisma db push && npx prisma db seed
        env:
          DATABASE_URL: file:./prisma/e2e-test.db

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: file:${{ github.workspace }}/backend/prisma/e2e-test.db
