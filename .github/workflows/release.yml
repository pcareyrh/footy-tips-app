name: Release

on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]
  push:
    tags: ['v*.*.*']

jobs:
  release:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'push'

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_run sets github.sha to the workflow file's SHA, not the triggering commit
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag push — use the tag as-is
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "bump=false" >> "$GITHUB_OUTPUT"
          else
            # CI-triggered release — bump patch version from package.json
            CURRENT=$(node -p "require('./package.json').version")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"
            echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
            echo "bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in package.json
        if: steps.version.outputs.bump == 'true'
        run: |
          npm version ${{ steps.version.outputs.next }} --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "Release ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD:main --tags

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
